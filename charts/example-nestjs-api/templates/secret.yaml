{{/*
  Secret: 민감한 정보 저장
  - helm install 시 --set으로 전달하거나 values 파일에 설정
  - 모든 민감한 값은 base64 인코딩되어 저장
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "example-nestjs-api.fullname" . }}-secret
  labels:
    {{- include "example-nestjs-api.labels" . | nindent 4 }}
type: Opaque
data:
  # PostgreSQL Primary
  postgres-primary-user: {{ .Values.postgres.primary.user | b64enc | quote }}
  postgres-primary-password: {{ .Values.postgres.primary.password | b64enc | quote }}

  # PostgreSQL Standby
  {{- if .Values.postgres.standby.user }}
  postgres-standby-user: {{ .Values.postgres.standby.user | b64enc | quote }}
  postgres-standby-password: {{ .Values.postgres.standby.password | b64enc | quote }}
  {{- end }}

  # Redis
  redis-password: {{ .Values.redis.password | b64enc | quote }}

  # JWT
  jwt-secret-key: {{ .Values.jwt.secretKey | b64enc | quote }}
  jwt-refresh-secret-key: {{ .Values.jwt.refreshSecretKey | b64enc | quote }}

  # OAuth (선택사항)
  {{- if .Values.oauth.google.clientSecret }}
  google-client-secret: {{ .Values.oauth.google.clientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.oauth.apple.privateKey }}
  apple-private-key: {{ .Values.oauth.apple.privateKey | b64enc | quote }}
  {{- end }}

  # Coturn
  {{- if .Values.coturn.turnSecret }}
  coturn-turn-secret: {{ .Values.coturn.turnSecret | b64enc | quote }}
  {{- end }}
